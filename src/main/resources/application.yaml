server:
  port: 8081

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${OPENAI_MODEL_NAME:qwen3-max}
      temperature: 0.3
      max-tokens: 2000
      timeout: 60s
      max-retries: 3
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${OPENAI_MODEL_NAME:qwen3-max}
      temperature: 0.3
      max-tokens: 2000
      timeout: 60s
      max-retries: 3
      log-requests: true
      log-responses: true
    embedding-model:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${EMBEDDING_MODEL_NAME:text-embedding-v1}
      timeout: 60s
      max-retries: 3
      log-requests: true
      log-responses: true

logging:
  level:
    dev.langchain4j: DEBUG
    org.springframework.web: DEBUG
    com.firstai: DEBUG

spring:
  application:
    name: multi-agent
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_vector}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}


